<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown UI 연습</title>
    <link rel="stylesheet" href="css/style.min.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <main>
      <h1>액션 메뉴 학습</h1>

      <section class="dropdown-section" aria-labelledby="dropdown-title">
        <h2 id="dropdown-title" class="dropdown-section__title">
          사용자 작업 메뉴
        </h2>
        <p class="dropdown-section__description">
          운영자가 사용자 상태 변경과 권한 수정 액션을 실행하는 Dropdown /
          Action Menu UI를 학습합니다.
        </p>
        <div class="dropdown">
          <button
            type="button"
            aria-expanded="false"
            aria-controls="action-menu"
            class="dropdown__trigger"
          >
            사용자 작업
          </button>

          <div id="action-menu" class="dropdown__menu" hidden>
            <button type="button" class="dropdown__item">활성으로 변경</button>
            <button type="button" class="dropdown__item">
              비활성으로 변경
            </button>
            <button type="button" class="dropdown__item">권한 수정</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
