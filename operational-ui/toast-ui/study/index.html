<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast UI 연습</title>
    <link rel="stylesheet" href="css/style.min.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <main>
      <h1>토스트 알림 학습</h1>

      <section class="toast-section" aria-labelledby="toast-title">
        <h2 id="toast-title" class="toast-section__title">작업 결과 알림</h2>
        <p class="toast-section__description">
          운영자가 사용자 작업 결과를 성공 또는 오류 토스트로 확인하는 UI를
          학습합니다.
        </p>

        <div class="toast">
          <div class="toast__actions">
            <button type="button" class="toast__button toast__button-success">
              성공 토스트
            </button>
            <button type="button" class="toast__button toast__button-error">
              오류 토스트
            </button>
          </div>
          <div class="toast__regions">
            <div
              class="toast__region toast__region--success"
              aria-live="polite"
            ></div>

            <div
              class="toast__region toast__region--error"
              aria-live="assertive"
            ></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
