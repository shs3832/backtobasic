<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal UI 연습</title>
    <link href="css/style.min.css" rel="stylesheet" />
    <script src="js/main.js"></script>
  </head>
  <body>
    <main>
      <h1>모달 연습</h1>
      <section class="modal-section" aria-labelledby="modal-section-title">
        <h2 class="modal-section__title" id="modal-section-title">모달 연습</h2>
        <p class="modal-section__description">모달 UI 및 액션을 학습합니다.</p>
        <button type="button" class="modal-open">삭제 확인 모달 열기</button>
      </section>

      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        aria-describedby="modal-desc"
        hidden
      >
        <div class="modal__content">
          <button type="button" class="modal__close" aria-label="모달 닫기">
            <span aria-hidden="true">x</span>
          </button>
          <h2 class="modal__title" id="modal-title">
            항목을 삭제하시겠습니까?
          </h2>
          <p class="modal__desc" id="modal-desc">
            삭제한 항목은 복구할 수 없습니다. 계속 진행하시겠습니까?
          </p>
          <div class="modal__actions">
            <button type="button" class="modal__button">취소</button>
            <button type="button" class="modal__button modal__button--danger">
              삭제
            </button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
