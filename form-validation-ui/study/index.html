<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation UI 연습</title>
    <link rel="stylesheet" href="css/style.min.css" />
  </head>
  <body>
    <main>
      <h1>폼 검증 학습</h1>
      <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title" class="form-section__title">폼 검증 UI</h2>
        <p class="form-section__description">
          실무 UI 구현에서 자주 사용하는 폼 검증 UI를 학습합니다.
        </p>
        <form class="form">
          <fieldset>
            <legend>회원 정보 입력</legend>

            <div class="form__block">
              <label for="name" class="form__label">
                이름 <span class="form__required">필수</span>
              </label>
              <input
                id="name"
                type="text"
                class="form__input"
                placeholder="이름을 입력해주세요"
                name="name"
                required
                aria-describedby="user-name-error"
              />
              <p id="user-name-error" class="form__error"></p>
            </div>
            <div class="form__block">
              <label for="email" class="form__label">
                이메일 <span class="form__required">필수</span>
              </label>

              <input
                id="email"
                type="email"
                class="form__input"
                placeholder="이메일을 입력해주세요"
                name="email"
                required
                aria-describedby="user-email-error"
              />
              <p id="user-email-error" class="form__error"></p>
            </div>
            <div class="form__block">
              <label for="password" class="form__label">
                비밀번호 <span class="form__required">필수</span>
              </label>
              <input
                id="password"
                type="password"
                class="form__input"
                placeholder="비밀번호 입력"
                name="password"
                required
                aria-describedby="password-help user-password-error"
              />
              <p id="password-help" class="form__help">
                8자 이상 입력해주세요.
              </p>
              <p id="user-password-error" class="form__error"></p>
            </div>
          </fieldset>
          <hr />
          <fieldset aria-describedby="interest-error">
            <legend>관심분야</legend>
            <div class="form__row">
              <div class="form__block">
                <input
                  type="checkbox"
                  class="form__checkbox"
                  name="interest"
                  value="html"
                  id="checkbox-html"
                />
                <label for="checkbox-html" class="form__label">HTML</label>
              </div>
              <div class="form__block">
                <input
                  type="checkbox"
                  class="form__checkbox"
                  name="interest"
                  value="css"
                  id="checkbox-css"
                />
                <label for="checkbox-css" class="form__label">CSS</label>
              </div>
              <div class="form__block">
                <input
                  type="checkbox"
                  class="form__checkbox"
                  name="interest"
                  value="javascript"
                  id="checkbox-javascript"
                />
                <label for="checkbox-javascript" class="form__label"
                  >JavaScript</label
                >
              </div>
            </div>
            <p id="interest-error" class="form__error"></p>
          </fieldset>
          <button type="submit" class="form__submit">가입하기</button>
        </form>
      </section>
    </main>
  </body>
</html>
